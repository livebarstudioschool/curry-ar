<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Camera Test</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <div id="status" style="position: fixed; top: 10px; left: 10px; z-index: 1000; color: white; background: rgba(0,0,0,0.5);">
        Status: Initializing...
    </div>

    <div id="click-layer" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; color: white;">
        <p>画面をタップしてカメラを起動</p>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: true;">
        <a-image
            src="SmelsLikeCurrySplitLOGO.PNG"
            scale="50 50 50"
            gps-entity-place="latitude: 33.58857946908129; longitude: 130.3967166542576;"
            position="0 1.6 -5">
        </a-image>
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        const layer = document.getElementById('click-layer');
        const status = document.getElementById('status');

        layer.addEventListener('click', function() {
            status.innerText = "Status: Starting Camera...";
            layer.style.display = 'none';
            
            // iPhone特有のセンサー許可を再度実行
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    status.innerText = "Status: Permission " + res;
                });
            }
        });
    </script>
</body>
</html>
