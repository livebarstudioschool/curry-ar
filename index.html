<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BADKee AR CHECK</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden; background: #000;">

    <div id="debug-log" style="position: fixed; top: 10px; left: 10px; z-index: 10001; color: #00ff00; font-size: 10px; background: rgba(0,0,0,0.7); pointer-events: none;">
        GPS AR Initializing...
    </div>

    <div id="tap-layer" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; text-align: center;">
        <div>
            <p style="font-size: 20px; font-weight: bold;">TAP TO START</p>
            <p style="font-size: 12px;">(ビル内ではGPSがズレやすいため、窓際を推奨します)</p>
        </div>
    </div>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: true; videoTexture: true;">
        
        <a-assets>
            <img id="my-logo" src="SmelsLikeCurrySplitLOGO.PNG">
        </a-assets>

        <a-entity 
            gps-entity-place="latitude: 33.588507; longitude: 130.396731;"
            position="0 50 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            
            <a-image src="#my-logo" scale="100 100 100" rotation="0 0 0"></a-image>
            <a-image src="#my-logo" scale="100 100 100" rotation="0 120 0"></a-image>
            <a-image src="#my-logo" scale="100 100 100" rotation="0 240 0"></a-image>
        </a-entity>

        <a-camera gps-camera="minDistance: 0; far: 10000;" rotation-reader></a-camera>
    </a-scene>

    <script>
        const layer = document.getElementById('tap-layer');
        const log = document.getElementById('debug-log');

        layer.addEventListener('click', function() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    log.innerText = "Permission: " + res;
                    if (res === 'granted') layer.style.display = 'none';
                });
            } else {
                layer.style.display = 'none';
            }
        });

        // 距離を画面に表示する簡易デバッグ
        window.addEventListener('gps-entity-place-added', (e) => {
            log.innerText += "\nGPS Entity Added!";
        });
    </script>
</body>
</html>
