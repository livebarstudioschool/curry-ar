<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Curry AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-look-controls.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <div id="permission-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;">
        <p>ARを開始するにはボタンを押してください</p>
        <button id="start-button" style="padding: 15px 30px; font-size: 18px; border-radius: 10px; border: none; background: #ff4500; color: white; cursor: pointer;">ARを起動する</button>
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-image
            src="https://badknee.scrambles.jp/wp-content/uploads/2026/04/SmelsLikeCurrySplitLOGO.png"
            scale="100 100 100"
            gps-entity-place="latitude: 33.588664; longitude: 130.396620;"
            position="0 50 0">
        </a-image>

        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        // ボタンを押したときにセンサーを許可させるスクリプト
        const button = document.getElementById('start-button');
        const overlay = document.getElementById('permission-overlay');

        button.addEventListener('click', function() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response == 'granted') {
                            overlay.style.display = 'none';
                        }
                    })
                    .catch(console.error);
            } else {
                // iPhone以外などの場合
                overlay.style.display = 'none';
            }
        });
    </script>
</body>
</html>
