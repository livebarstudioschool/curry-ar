<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Curry AR Test</title>
    <script src="https://unpkg.com/aframe@1.3.0/dist/aframe-master.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-look-controls.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #debug-text { position: fixed; top: 10px; left: 10px; z-index: 10000; color: #00ff00; font-family: monospace; font-size: 12px; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <div id="debug-text">System Loading...</div>

    <div id="overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center;">
        <button id="start-btn" style="padding: 20px 40px; font-size: 20px; background: #ff4500; color: white; border: none; border-radius: 10px;">ARカメラを起動</button>
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-assets>
            <img id="logo" src="https://badknee.scrambles.jp/wp-content/uploads/2026/04/SmelsLikeCurrySplitLOGO.png" crossorigin="anonymous">
        </a-assets>

        <a-image
            src="#logo"
            look-at="[gps-camera]"
            scale="50 50 50"
            gps-entity-place="latitude: 33.588664; longitude: 130.396620;"
            position="0 10 0">
        </a-image>

        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        const btn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const debug = document.getElementById('debug-text');

        btn.addEventListener('click', function() {
            debug.innerText = "Requesting Permissions...";
            
            // iPhoneのセンサー許可
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') {
                            debug.innerText = "Permission Granted. Starting...";
                            overlay.style.display = 'none';
                        } else {
                            debug.innerText = "Permission Denied.";
                        }
                    })
                    .catch(e => {
                        debug.innerText = "Error: " + e;
                    });
            } else {
                // iPhone以外
                overlay.style.display = 'none';
            }
        });

        // 読み込み完了チェック
        window.addEventListener('load', () => {
            debug.innerText = "Ready to Start";
        });
    </script>
</body>
</html>
