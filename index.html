<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BADKee AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-look-controls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">

        <a-image
            src="SmelsLikeCurrySplitLOGO.PNG"
            look-at="[gps-camera]"
            scale="20 20 20"
            gps-entity-place="latitude: 33.588664; longitude: 130.396620;"
            position="0 10 0">
        </a-image>

        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>
</body>
</html>
