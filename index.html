<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Front Test</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden; background: #000;">

    <div id="tap-layer" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; color: white; cursor: pointer;">
        <div style="text-align: center;">
            <p style="font-size: 20px;">画面をタップして開始</p>
            <p style="font-size: 12px;">(目の前5mにロゴが出ます)</p>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <img id="my-logo" src="SmelsLikeCurrySplitLOGO.png">
        </a-assets>

        <a-image 
            src="#my-logo" 
            position="0 1.6 -5" 
            scale="4 4 4">
        </a-image>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const layer = document.getElementById('tap-layer');
        layer.addEventListener('click', function() {
            // iPhoneのセンサー許可（一応実行）
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission();
            }
            layer.style.display = 'none';
        });
    </script>
</body>
</html>
