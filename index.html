<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BADKee AR Front Test</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://unpkg.com/@ar-js-org/ar.js@3.3.3/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden; background: #000;">

    <div id="tap-layer" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; text-align: center;">
        <div>
            <p style="font-size: 20px; font-weight: bold; color: #ff4500;">TEST STAGE: FRONT</p>
            <p style="font-size: 14px; margin-top: 10px;">タップすると目の前5mにロゴが出ます</p>
        </div>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <img id="my-logo" src="SmelsLikeCurrySplitLOGO.PNG">
        </a-assets>

        <a-entity 
            position="0 1.6 -5"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            
            <a-image src="#my-logo" scale="4 4 4" rotation="0 0 0" material="depthTest: false"></a-image>
            <a-image src="#my-logo" scale="4 4 4" rotation="0 120 0" material="depthTest: false"></a-image>
            <a-image src="#my-logo" scale="4 4 4" rotation="0 240 0" material="depthTest: false"></a-image>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const layer = document.getElementById('tap-layer');
        layer.addEventListener('click', function() {
            // iOSのセンサー許可
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if (res === 'granted') layer.style.display = 'none';
                });
            } else {
                layer.style.display = 'none';
            }
        });
    </script>
</body>
</html>
