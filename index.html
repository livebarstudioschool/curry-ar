<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BADKee AR FINAL</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden; background: #000;">

    <div id="tap-layer" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; text-align: center;">
        <div>
            <p style="font-size: 24px; font-weight: bold; color: #ff4500;">ENTER AR STAGE</p>
            <p style="font-size: 14px; margin-top: 10px;">タップして空を見上げてください</p>
        </div>
    </div>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;">
        
        <a-assets>
            <img id="my-logo" src="SmelsLikeCurrySplitLOGO.png">
        </a-assets>

        <a-entity 
            gps-entity-place="latitude: 33.588507057019406; longitude: 130.39673155051167;"
            position="0 50 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            
            <a-image src="#my-logo" scale="100 100 100" rotation="0 0 0"></a-image>
            <a-image src="#my-logo" scale="100 100 100" rotation="0 120 0"></a-image>
            <a-image src="#my-logo" scale="100 100 100" rotation="0 240 0"></a-image>
        </a-entity>

        <a-camera gps-camera="simulateAltitude: 1.6; far: 10000;" rotation-reader></a-camera>
    </a-scene>

    <script>
        const layer = document.getElementById('tap-layer');
        layer.addEventListener('click', function() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if (res === 'granted') layer.style.display = 'none';
                });
            } else {
                layer.style.display = 'none';
            }
        });
    </script>
</body>
</html>
